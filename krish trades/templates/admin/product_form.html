{% extends "admin/base_admin.html" %}
{% block title %}{{ 'Edit' if product else 'Add' }} Product - Admin{% endblock %}

{% block content %}
<h3 class="mb-4">{{ 'Edit Product' if product else 'Add New Product' }}</h3>

<div class="card shadow-sm border-0" style="max-width:600px;">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Product Name *</label>
                <input type="text" name="name" class="form-control" value="{{ product.name if product else '' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Category</label>
                <input type="text" name="category" class="form-control" value="{{ product.category if product else '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4">{{ product.description if product else '' }}</textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Price (₹) *</label>
                    <input type="number" step="0.01" name="price" class="form-control" value="{{ product.price if product else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Stock Quantity *</label>
                    <input type="number" name="stock" class="form-control" value="{{ product.stock if product else 0 }}" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Discount (%)</label>
                    <input type="number" step="0.01" min="0" max="100" name="discount_percent" class="form-control" value="{{ product.discount_percent if product else 0 }}">
                    <div class="form-text">Leave as 0 for no discount.</div>
                </div>
                <div class="col-md-6 mb-3 d-flex align-items-end">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="is_bakrid_offer" id="is_bakrid_offer" {% if product and product.is_bakrid_offer %}checked{% endif %}>
                        <label class="form-check-label" for="is_bakrid_offer">🌙 Mark as Bakrid Special Offer</label>
                    </div>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Product Image</label>
                <input type="file" name="image" class="form-control" accept="image/*">
                {% if product and product.image %}
                <img src="{{ url_for('static', filename='uploads/' + product.image) }}" class="mt-2 rounded" style="width:80px;height:80px;object-fit:cover;">
                {% endif %}
            </div>
            <button type="submit" class="btn btn-primary">{{ 'Update Product' if product else 'Add Product' }}</button>
            <a href="{{ url_for('admin_products') }}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
